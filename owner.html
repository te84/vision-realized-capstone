
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f0f2f5; }
        .navbar { background: #333; color: white; padding: 15px; display: flex; justify-content: space-between; }
        .container { padding: 20px; }
        .welcome { background: white; padding: 20px; border-radius: 5px; margin-bottom: 20px; }
        button { padding: 8px 15px; background: #dc3545; color: white; border: none; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>Vision Realized - Owner Portal</h2>
        <button onclick="logout()">Logout</button>
    </div>
    
    <div class="container">
        <div class="welcome" id="welcome">
            Loading...
        </div>
    </div>

    <script>
        // Check if user is logged in
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = 'login.html';
        }
        
        document.getElementById('welcome').innerHTML = `
            <h3>Welcome, ${user.firstname || user.username}!</h3>
            <p>Role: ${user.role}</p>
            <p>Email: ${user.email || 'Not provided'}</p>
        `;
        
        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
